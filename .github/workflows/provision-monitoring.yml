name: Subscribe Production Alarm Email

on:
  workflow_dispatch:
    inputs:
      alarm_email:
        description: Email address that receives production alarm notifications
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  subscribe:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Subscribe to the existing production topic
        shell: bash
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ALARM_EMAIL: ${{ inputs.alarm_email }}
          TOPIC_ARN: arn:aws:sns:ap-northeast-2:555980271919:SketchCatchProductionAlerts
        run: |
          set -euo pipefail

          existing_subscription="$(aws sns list-subscriptions-by-topic \
            --topic-arn "${TOPIC_ARN}" \
            --query "Subscriptions[?Endpoint=='${ALARM_EMAIL}'].SubscriptionArn | [0]" \
            --output text \
            --region "${AWS_REGION}")"

          if [ "${existing_subscription}" = "None" ] || [ -z "${existing_subscription}" ]; then
            aws sns subscribe \
              --topic-arn "${TOPIC_ARN}" \
              --protocol email \
              --notification-endpoint "${ALARM_EMAIL}" \
              --region "${AWS_REGION}"
          fi

          echo "Confirm the subscription email before relying on alarm delivery."
