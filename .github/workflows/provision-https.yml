name: Provision HTTPS

on:
  workflow_dispatch:
    inputs:
      domain_name:
        description: Domain name to point at the production ALB
        required: true
        default: sketchcatch.net

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Discover network inputs
        id: discover
        run: |
          set -euo pipefail

          domain_name="${DOMAIN_NAME%.}"

          hosted_zone_id="$(aws route53 list-hosted-zones-by-name \
            --dns-name "${domain_name}." \
            --query "HostedZones[?Name=='${domain_name}.']|[0].Id" \
            --output text)"
          hosted_zone_id="${hosted_zone_id#/hostedzone/}"

          if [ -z "${hosted_zone_id}" ] || [ "${hosted_zone_id}" = "None" ]; then
            echo "Hosted zone not found for ${domain_name}" >&2
            exit 1
          fi

          vpc_id="$(aws ec2 describe-instances \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --query "Reservations[0].Instances[0].VpcId" \
            --output text)"

          ec2_security_group_id="$(aws ec2 describe-instances \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --query "Reservations[0].Instances[0].SecurityGroups[0].GroupId" \
            --output text)"

          subnet_ids="$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${vpc_id}" "Name=default-for-az,Values=true" \
            --query "Subnets[].SubnetId" \
            --output text | tr '\t' ',')"

          if [ -z "${subnet_ids}" ]; then
            subnet_ids="$(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=${vpc_id}" \
              --query "Subnets[?MapPublicIpOnLaunch==\`true\`].SubnetId" \
              --output text | tr '\t' ',')"
          fi

          subnet_count="$(printf '%s' "${subnet_ids}" | awk -F',' '{print NF}')"
          if [ "${subnet_count}" -lt 2 ]; then
            echo "At least two public subnets are required for an ALB. Found: ${subnet_ids}" >&2
            exit 1
          fi

          {
            echo "domain_name=${domain_name}"
            echo "hosted_zone_id=${hosted_zone_id}"
            echo "vpc_id=${vpc_id}"
            echo "ec2_security_group_id=${ec2_security_group_id}"
            echo "subnet_ids=${subnet_ids}"
          } >> "${GITHUB_OUTPUT}"
        env:
          DOMAIN_NAME: ${{ inputs.domain_name }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID || 'i-02a591d2abee94f02' }}

      - name: Deploy ALB HTTPS stack
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name sketchcatch-production-https \
            --template-file infra/aws/cloudformation/alb-https.yml \
            --parameter-overrides \
              DomainName="${DOMAIN_NAME}" \
              HostedZoneId="${HOSTED_ZONE_ID}" \
              VpcId="${VPC_ID}" \
              SubnetIds="${SUBNET_IDS}" \
              Ec2InstanceId="${EC2_INSTANCE_ID}" \
              Ec2SecurityGroupId="${EC2_SECURITY_GROUP_ID}" \
            --region "${AWS_REGION}"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          DOMAIN_NAME: ${{ steps.discover.outputs.domain_name }}
          HOSTED_ZONE_ID: ${{ steps.discover.outputs.hosted_zone_id }}
          VPC_ID: ${{ steps.discover.outputs.vpc_id }}
          SUBNET_IDS: ${{ steps.discover.outputs.subnet_ids }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID || 'i-02a591d2abee94f02' }}
          EC2_SECURITY_GROUP_ID: ${{ steps.discover.outputs.ec2_security_group_id }}

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name sketchcatch-production-https \
            --query "Stacks[0].Outputs" \
            --output table \
            --region "${AWS_REGION}"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
