name: Run Production Database Migrations

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Enter run-production-migration"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-database-migration
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
  ECS_WORKER_TASK_DEFINITION_FAMILY: ${{ vars.ECS_WORKER_TASK_DEFINITION_FAMILY }}
  ECS_WORKER_CONTAINER_NAME: ${{ vars.ECS_WORKER_CONTAINER_NAME }}
  ECS_WORKER_SUBNETS: ${{ vars.ECS_WORKER_SUBNETS }}
  ECS_WORKER_SECURITY_GROUP_IDS: ${{ vars.ECS_WORKER_SECURITY_GROUP_IDS }}
  ECS_WORKER_ASSIGN_PUBLIC_IP: ${{ vars.ECS_WORKER_ASSIGN_PUBLIC_IP }}
  RDS_INSTANCE_IDENTIFIER: ${{ vars.RDS_INSTANCE_IDENTIFIER }}

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate migration confirmation
        shell: bash
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          test "${CONFIRMATION}" = "run-production-migration"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migration compatibility
        run: pnpm migration:compatibility:check

      - name: Validate migration variables
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(
            AWS_REGION
            ECS_CLUSTER_NAME
            ECS_WORKER_TASK_DEFINITION_FAMILY
            ECS_WORKER_CONTAINER_NAME
            ECS_WORKER_SUBNETS
            ECS_WORKER_SECURITY_GROUP_IDS
            ECS_WORKER_ASSIGN_PUBLIC_IP
            RDS_INSTANCE_IDENTIFIER
          )
          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required for production migration."
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create pre-migration RDS snapshot
        id: snapshot
        shell: bash
        run: |
          set -euo pipefail
          snapshot_id="sketchcatch-production-pre-migration-${GITHUB_RUN_ID}"
          aws rds create-db-snapshot \
            --db-instance-identifier "${RDS_INSTANCE_IDENTIFIER}" \
            --db-snapshot-identifier "${snapshot_id}" \
            --tags \
              Key=Purpose,Value=PreMigrationRollback \
              Key=GitHubRunId,Value="${GITHUB_RUN_ID}"
          aws rds wait db-snapshot-available \
            --db-snapshot-identifier "${snapshot_id}"
          echo "snapshot-id=${snapshot_id}" >> "${GITHUB_OUTPUT}"

      - name: Run migration as one-off ECS task
        id: migration
        shell: bash
        run: |
          set -euo pipefail

          IFS=',' read -r -a subnets <<< "${ECS_WORKER_SUBNETS}"
          IFS=',' read -r -a security_groups <<< "${ECS_WORKER_SECURITY_GROUP_IDS}"
          subnets_json="$(printf '%s\n' "${subnets[@]}" | jq -R . | jq -s .)"
          security_groups_json="$(printf '%s\n' "${security_groups[@]}" | jq -R . | jq -s .)"

          jq -n \
            --arg cluster "${ECS_CLUSTER_NAME}" \
            --arg task_definition "${ECS_WORKER_TASK_DEFINITION_FAMILY}" \
            --arg container_name "${ECS_WORKER_CONTAINER_NAME}" \
            --arg assign_public_ip "${ECS_WORKER_ASSIGN_PUBLIC_IP}" \
            --argjson subnets "${subnets_json}" \
            --argjson security_groups "${security_groups_json}" \
            '{
              cluster: $cluster,
              taskDefinition: $task_definition,
              launchType: "FARGATE",
              networkConfiguration: {
                awsvpcConfiguration: {
                  subnets: $subnets,
                  securityGroups: $security_groups,
                  assignPublicIp: $assign_public_ip
                }
              },
              overrides: {
                containerOverrides: [{
                  name: $container_name,
                  command: ["node", "dist/db/migrate.cjs"]
                }]
              },
              startedBy: "sketchcatch-migration"
            }' > ecs-migration-task.json

          task_arn="$(aws ecs run-task \
            --cli-input-json file://ecs-migration-task.json \
            --query 'tasks[0].taskArn' \
            --output text)"
          test -n "${task_arn}" && test "${task_arn}" != "None"
          echo "task-arn=${task_arn}" >> "${GITHUB_OUTPUT}"

          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER_NAME}" \
            --tasks "${task_arn}"

          exit_code="$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER_NAME}" \
            --tasks "${task_arn}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)"
          test "${exit_code}" = "0"

      - name: Migration evidence
        run: |
          echo "Snapshot: ${{ steps.snapshot.outputs.snapshot-id }}"
          echo "ECS task: ${{ steps.migration.outputs.task-arn }}"

      - name: Retain the three latest migration snapshots
        shell: bash
        run: |
          set -euo pipefail

          old_snapshots="$(aws rds describe-db-snapshots \
            --db-instance-identifier "${RDS_INSTANCE_IDENTIFIER}" \
            --snapshot-type manual \
            --query "reverse(sort_by(DBSnapshots[?starts_with(DBSnapshotIdentifier, 'sketchcatch-production-pre-migration-')], &SnapshotCreateTime))[3:].DBSnapshotIdentifier" \
            --output text)"

          for snapshot_id in ${old_snapshots}; do
            aws rds delete-db-snapshot --db-snapshot-identifier "${snapshot_id}"
          done
