name: Run Database Migrations

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run migrations on EC2 with SSM
        run: |
          set -euo pipefail

          jq -n \
            '{
              commands: [
                "set -euo pipefail",
                "image_tag=\"$(cat /opt/sketchcatch/current-image)\"",
                "docker run --rm --network sketchcatch --env-file /etc/sketchcatch/api.env \"sketchcatch-api:${image_tag}\" sh -c \"node -e 'const fs=require(\\\"fs\\\"); const p=\\\"./drizzle/meta/_journal.json\\\"; const s=fs.readFileSync(p,\\\"utf8\\\"); if (s.charCodeAt(0)===0xFEFF) fs.writeFileSync(p,s.slice(1),\\\"utf8\\\");' && node dist/db/migrate.cjs\""
              ],
              executionTimeout: ["900"]
            }' > ssm-migrate-parameters.json

          command_id="$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Run SketchCatch database migrations" \
            --parameters file://ssm-migrate-parameters.json \
            --region "${AWS_REGION}" \
            --query "Command.CommandId" \
            --output text)"

          command_status="Pending"
          for attempt in $(seq 1 60); do
            command_status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --region "${AWS_REGION}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")"

            case "${command_status}" in
              Success|Cancelled|TimedOut|Failed|Cancelling)
                break
                ;;
              *)
                sleep 10
                ;;
            esac
          done

          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          test "${command_status}" = "Success"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID || 'i-02a591d2abee94f02' }}
