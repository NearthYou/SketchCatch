name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build Docker images
        run: |
          docker build -f docker/api.Dockerfile -t "sketchcatch-api:${GITHUB_SHA}" .
          docker build -f docker/web.Dockerfile -t "sketchcatch-web:${GITHUB_SHA}" .
          docker build -f docker/nginx.Dockerfile -t "sketchcatch-nginx:${GITHUB_SHA}" .

      - name: Package Docker images
        run: |
          mkdir -p .release
          docker save \
            "sketchcatch-api:${GITHUB_SHA}" \
            "sketchcatch-web:${GITHUB_SHA}" \
            "sketchcatch-nginx:${GITHUB_SHA}" \
            | gzip > ".release/sketchcatch-docker-${GITHUB_SHA}.tar.gz"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Apply EC2 runtime IAM policy
        run: |
          aws iam put-role-policy \
            --role-name "${SKETCHCATCH_RUNTIME_ROLE_NAME}" \
            --policy-name "${SKETCHCATCH_RUNTIME_POLICY_NAME}" \
            --policy-document file://infra/aws/iam/ec2-runtime-policy.json

          aws iam get-role-policy \
            --role-name "${SKETCHCATCH_RUNTIME_ROLE_NAME}" \
            --policy-name "${SKETCHCATCH_RUNTIME_POLICY_NAME}" \
            --query "PolicyDocument.Statement[?Sid=='AllowSketchCatchAwsConnectionAssumeRole']" \
            --output json
        env:
          SKETCHCATCH_RUNTIME_ROLE_NAME: ${{ vars.SKETCHCATCH_RUNTIME_ROLE_NAME || 'SketchCatch-EC2-Role' }}
          SKETCHCATCH_RUNTIME_POLICY_NAME: ${{ vars.SKETCHCATCH_RUNTIME_POLICY_NAME || 'SketchCatchRuntimePolicy' }}

      - name: Upload Docker image artifact to S3
        run: |
          aws s3 cp \
            ".release/sketchcatch-docker-${GITHUB_SHA}.tar.gz" \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/sketchcatch/docker/${GITHUB_SHA}.tar.gz" \
            --region "${AWS_REGION}"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          DEPLOY_ARTIFACT_BUCKET: ${{ vars.DEPLOY_ARTIFACT_BUCKET }}

      - name: Deploy Docker release to EC2 with SSM
        run: |
          set -euo pipefail

          release_prefix="sketchcatch/releases/${GITHUB_SHA}"
          web_env_path=".release/web.env"
          api_env_path=".release/api.env"

          cleanup() {
            aws s3 rm "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/" \
              --recursive \
              --region "${AWS_REGION}" || true
          }
          trap cleanup EXIT

          cat > "${web_env_path}" <<'ENV'
          NODE_ENV=production
          PORT=3000
          HOSTNAME=0.0.0.0
          NEXT_PUBLIC_API_BASE_URL=/api
          ENV

          cat > "${api_env_path}" <<ENV
          NODE_ENV=production
          PORT=4000
          DATABASE_URL=${DATABASE_URL}
          DATABASE_SSL=${DATABASE_SSL:-false}
          TF_PLUGIN_CACHE_DIR=${TF_PLUGIN_CACHE_DIR}
          TRIVY_CACHE_DIR=${TRIVY_CACHE_DIR}
          RDS_ENDPOINT=${RDS_ENDPOINT}
          AWS_REGION=${AWS_REGION}
          S3_BUCKET_NAME=${S3_BUCKET_NAME}
          AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET}
          CLOUDFORMATION_TEMPLATE_TOKEN_SECRET=${CLOUDFORMATION_TEMPLATE_TOKEN_SECRET}
          SKETCHCATCH_AWS_CALLER_PRINCIPAL_ARN=${SKETCHCATCH_AWS_CALLER_PRINCIPAL_ARN}
          SKETCHCATCH_PUBLIC_BASE_URL=${SKETCHCATCH_PUBLIC_BASE_URL}
          OAUTH_REDIRECT_BASE_URL=${OAUTH_REDIRECT_BASE_URL}
          NAVER_OAUTH_CLIENT_ID=${NAVER_OAUTH_CLIENT_ID}
          NAVER_OAUTH_CLIENT_SECRET=${NAVER_OAUTH_CLIENT_SECRET}
          KAKAO_OAUTH_CLIENT_ID=${KAKAO_OAUTH_CLIENT_ID}
          KAKAO_OAUTH_CLIENT_SECRET=${KAKAO_OAUTH_CLIENT_SECRET}
          GIT_OAUTH_CLIENT_ID=${GIT_OAUTH_CLIENT_ID}
          GIT_OAUTH_CLIENT_SECRET=${GIT_OAUTH_CLIENT_SECRET}
          GIT_APP_ID=${GIT_APP_ID}
          GIT_APP_SLUG=${GIT_APP_SLUG}
          GIT_APP_PRIVATE_KEY_BASE64=${GIT_APP_PRIVATE_KEY_BASE64}
          GIT_APP_CALLBACK_URL=${GIT_APP_CALLBACK_URL}
          GIT_APP_STATE_SECRET=${GIT_APP_STATE_SECRET}
          REDIS_URL=${REDIS_URL}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=${OPENAI_MODEL}
          ENV

          aws s3 cp deploy/ec2/bootstrap-amazon-linux.sh \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/bootstrap-amazon-linux.sh" \
            --sse AES256 \
            --region "${AWS_REGION}"
          aws s3 cp deploy/ec2/deploy-docker-release.sh \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/deploy-docker-release.sh" \
            --sse AES256 \
            --region "${AWS_REGION}"
          aws s3 cp "${web_env_path}" \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/web.env" \
            --sse AES256 \
            --region "${AWS_REGION}"
          aws s3 cp "${api_env_path}" \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/api.env" \
            --sse AES256 \
            --region "${AWS_REGION}"

          release_url="$(aws s3 presign \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/sketchcatch/docker/${GITHUB_SHA}.tar.gz" \
            --expires-in 3600 \
            --region "${AWS_REGION}")"
          bootstrap_url="$(aws s3 presign \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/bootstrap-amazon-linux.sh" \
            --expires-in 3600 \
            --region "${AWS_REGION}")"
          deploy_script_url="$(aws s3 presign \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/deploy-docker-release.sh" \
            --expires-in 3600 \
            --region "${AWS_REGION}")"
          web_env_url="$(aws s3 presign \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/web.env" \
            --expires-in 3600 \
            --region "${AWS_REGION}")"
          api_env_url="$(aws s3 presign \
            "s3://${DEPLOY_ARTIFACT_BUCKET}/${release_prefix}/api.env" \
            --expires-in 3600 \
            --region "${AWS_REGION}")"

          jq -n \
            --arg bootstrap_url "${bootstrap_url}" \
            --arg deploy_script_url "${deploy_script_url}" \
            --arg web_env_url "${web_env_url}" \
            --arg api_env_url "${api_env_url}" \
            --arg release_url "${release_url}" \
            --arg release_id "${GITHUB_SHA}" \
            --arg aws_region "${AWS_REGION}" \
            --arg cloudwatch_logs_enabled "${CLOUDWATCH_LOGS_ENABLED}" \
            --arg cloudwatch_log_group_prefix "${CLOUDWATCH_LOG_GROUP_PREFIX}" \
            --arg terraform_plugin_cache_dir "${TF_PLUGIN_CACHE_DIR}" \
            --arg trivy_cache_dir "${TRIVY_CACHE_DIR}" \
            '{
              commands: [
                "set -euo pipefail",
                "curl --fail --location " + ($bootstrap_url | @sh) + " --output /tmp/sketchcatch-bootstrap.sh",
                "curl --fail --location " + ($deploy_script_url | @sh) + " --output /tmp/sketchcatch-deploy.sh",
                "curl --fail --location " + ($web_env_url | @sh) + " --output /tmp/sketchcatch-web.env",
                "curl --fail --location " + ($api_env_url | @sh) + " --output /tmp/sketchcatch-api.env",
                "sudo bash /tmp/sketchcatch-bootstrap.sh",
                "sudo install -d -m 0755 /etc/sketchcatch",
                "sudo install -m 0600 /tmp/sketchcatch-web.env /etc/sketchcatch/web.env",
                "sudo install -m 0600 /tmp/sketchcatch-api.env /etc/sketchcatch/api.env",
                "sudo env AWS_REGION=" + ($aws_region | @sh) + " CLOUDWATCH_LOGS_ENABLED=" + ($cloudwatch_logs_enabled | @sh) + " CLOUDWATCH_LOG_GROUP_PREFIX=" + ($cloudwatch_log_group_prefix | @sh) + " TF_PLUGIN_CACHE_DIR=" + ($terraform_plugin_cache_dir | @sh) + " TRIVY_CACHE_DIR=" + ($trivy_cache_dir | @sh) + " RELEASE_ID=" + ($release_id | @sh) + " RELEASE_URL=" + ($release_url | @sh) + " bash /tmp/sketchcatch-deploy.sh"
              ],
              executionTimeout: ["1800"]
            }' > .release/ssm-deploy-parameters.json

          command_id="$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy SketchCatch ${GITHUB_SHA}" \
            --parameters file://.release/ssm-deploy-parameters.json \
            --region "${AWS_REGION}" \
            --query "Command.CommandId" \
            --output text)"

          command_status="Pending"
          for attempt in $(seq 1 120); do
            command_status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --region "${AWS_REGION}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")"

            case "${command_status}" in
              Success|Cancelled|TimedOut|Failed|Cancelling)
                break
                ;;
              *)
                sleep 10
                ;;
            esac
          done

          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          test "${command_status}" = "Success"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          CLOUDWATCH_LOGS_ENABLED: ${{ vars.CLOUDWATCH_LOGS_ENABLED || 'false' }}
          CLOUDWATCH_LOG_GROUP_PREFIX: ${{ vars.CLOUDWATCH_LOG_GROUP_PREFIX || '/sketchcatch/production' }}
          DATABASE_SSL: ${{ vars.DATABASE_SSL }}
          DEPLOY_ARTIFACT_BUCKET: ${{ vars.DEPLOY_ARTIFACT_BUCKET }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID || 'i-02a591d2abee94f02' }}
          TF_PLUGIN_CACHE_DIR: ${{ vars.TF_PLUGIN_CACHE_DIR || '/var/cache/sketchcatch/terraform-plugin-cache' }}
          TRIVY_CACHE_DIR: ${{ vars.TRIVY_CACHE_DIR || '/var/cache/sketchcatch/trivy' }}
          AUTH_TOKEN_SECRET: ${{ secrets.AUTH_TOKEN_SECRET }}
          CLOUDFORMATION_TEMPLATE_TOKEN_SECRET: ${{ secrets.CLOUDFORMATION_TEMPLATE_TOKEN_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GIT_OAUTH_CLIENT_ID: ${{ vars.GIT_OAUTH_CLIENT_ID }}
          GIT_OAUTH_CLIENT_SECRET: ${{ secrets.GIT_OAUTH_CLIENT_SECRET }}
          GIT_APP_ID: ${{ vars.GIT_APP_ID }}
          GIT_APP_SLUG: ${{ vars.GIT_APP_SLUG }}
          GIT_APP_PRIVATE_KEY_BASE64: ${{ secrets.GIT_APP_PRIVATE_KEY_BASE64 }}
          GIT_APP_CALLBACK_URL: ${{ vars.GIT_APP_CALLBACK_URL }}
          GIT_APP_STATE_SECRET: ${{ secrets.GIT_APP_STATE_SECRET }}
          KAKAO_OAUTH_CLIENT_ID: ${{ vars.KAKAO_OAUTH_CLIENT_ID }}
          KAKAO_OAUTH_CLIENT_SECRET: ${{ secrets.KAKAO_OAUTH_CLIENT_SECRET }}
          NAVER_OAUTH_CLIENT_ID: ${{ vars.NAVER_OAUTH_CLIENT_ID }}
          NAVER_OAUTH_CLIENT_SECRET: ${{ secrets.NAVER_OAUTH_CLIENT_SECRET }}
          OAUTH_REDIRECT_BASE_URL: ${{ vars.OAUTH_REDIRECT_BASE_URL || 'https://sketchcatch.net' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          RDS_ENDPOINT: ${{ vars.RDS_ENDPOINT }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
          SKETCHCATCH_AWS_CALLER_PRINCIPAL_ARN: ${{ vars.SKETCHCATCH_AWS_CALLER_PRINCIPAL_ARN }}
          SKETCHCATCH_PUBLIC_BASE_URL: ${{ vars.SKETCHCATCH_PUBLIC_BASE_URL || 'https://sketchcatch.net' }}
