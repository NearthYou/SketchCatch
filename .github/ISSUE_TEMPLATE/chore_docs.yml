name: Chore / Docs
description: 문서, 설정, 기타 작업 이슈
title: "Chore: "
labels: ["chore"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      options:
        - Chore
        - Docs
        - Refactor
        - Style
        - Remove
    validations:
      required: true
  - type: textarea
    id: work
    attributes:
      label: 작업 내용
      description: 필요한 작업을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      placeholder: |
        - [ ] 문서 반영
        - [ ] CI 통과
    validations:
      required: true
