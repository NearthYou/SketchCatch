name: Feature
description: 기능 개발 작업 이슈
title: "Feat: "
labels: ["feature"]
body:
  - type: textarea
    id: work
    attributes:
      label: 작업 내용
      description: 구현할 기능을 작업 단위로 적어주세요.
      placeholder: 로그인 기능을 구현한다.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: PR 머지 전에 만족해야 할 조건을 체크리스트로 적어주세요.
      placeholder: |
        - [ ] API 연동
        - [ ] 화면 상태 처리
        - [ ] 테스트 완료
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      placeholder: 없음
