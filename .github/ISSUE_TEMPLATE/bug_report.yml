name: Bug
description: 버그 수정 작업 이슈
title: "Fix: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제
      description: 어떤 문제가 발생했는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: cause
    attributes:
      label: 원인
      description: 파악된 원인이 있다면 적어주세요.
      placeholder: 아직 모르면 "조사 필요"라고 적어도 됩니다.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 해결 방향
      description: 어떻게 해결할 계획인지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 영향받는 화면, API, 모듈을 적어주세요.
    validations:
      required: true
