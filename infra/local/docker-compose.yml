services:
  postgres:
    image: postgres:16-alpine
    container_name: sketchcatch-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sketchcatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sketchcatch}
      POSTGRES_DB: ${POSTGRES_DB:-sketchcatch}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sketchcatch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: sketchcatch-redis
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sketchcatch_postgres_data:
